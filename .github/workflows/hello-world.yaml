#
# The simplest possible GitHub Actions workflow
#

name: Hello World

on:
  # Triggers this werkflow on push to the main branch of this code repository
  push:
    branch:
      - main
      #
      # Allows deployment to be invoked manually through the GitHub UI
  workflow_dispatch:

# A Workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "hello-worls"
  hello-world:
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      # runs our "Hello world" shell script
      - name: Runs the "Hello World" script
        run: ./index.sh
          echo "job is done"
